name: Release Arch Radio

on:
  push:
    branches:
      - main

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm install

      - name: Generate Version
        id: version
        shell: pwsh
        run: |
          $major = (Get-Date).Year % 100
          $minor = (Get-Date).Month
          $version = "$major.$minor.${{ github.run_number }}"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          
          # Update tauri.conf.json
          $config = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $config.version = $version
          $config | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json
          
          # Update Cargo.toml
          $cargo = Get-Content src-tauri/Cargo.toml
          $cargo = $cargo -replace '^version = ".*"', "version = `"$version`""
          Set-Content src-tauri/Cargo.toml $cargo

      - name: Generate Changelog
        id: changelog
        shell: pwsh
        run: |
          $commits = git log $(git describe --tags --abbrev=0 2>$null || git rev-list --max-parents=0 HEAD)..HEAD --pretty=format:"%s"
          $feats = $commits | Where-Object { $_ -match '^feat' }
          $fixes = $commits | Where-Object { $_ -match '^fix' }
          $others = $commits | Where-Object { $_ -notmatch '^(feat|fix)' }
          
          $body = "## Release v${{ steps.version.outputs.VERSION }}`n`n"
          if ($feats) { $body += "### 🚀 Features`n" + ($feats -join "`n") + "`n`n" }
          if ($fixes) { $body += "### 🛠️ Fixes`n" + ($fixes -join "`n") + "`n`n" }
          if ($others) { $body += "### 📝 Others`n" + ($others -join "`n") + "`n`n" }
          
          $body | Set-Content changelog.md
          $content = Get-Content changelog.md -Raw
          $content = $content -replace "`n", "%0A" -replace "`r", ""
          echo "BODY=$content" >> $env:GITHUB_OUTPUT

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Build and Release
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        with:
          tagName: v${{ steps.version.outputs.VERSION }}
          releaseName: "Arch Radio v${{ steps.version.outputs.VERSION }}"
          releaseBody: "${{ steps.changelog.outputs.BODY }}"
          releaseDraft: false
          prerelease: false
          includeRelease: true
          args: --verbose

      - name: Generate latest.json
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          echo "Looking for signatures in src-tauri/target/release/bundle/ ..."
          
          # Find any .sig file recursively in the whole workspace
          $sigFiles = Get-ChildItem -Path "." -Filter "*.sig" -Recurse
          if ($null -eq $sigFiles) {
              Write-Error "No .sig files found! Build might have skipped signing."
              exit 1
          }
          
          $sigFile = $sigFiles | Select-Object -First 1
          $sigContent = Get-Content $sigFile.FullName
          echo "Found signature: $($sigFile.Name)"
          
          # Find the corresponding installer file in the whole workspace
          $installerFile = Get-ChildItem -Path "." -Filter ($sigFile.BaseName) -Recurse | Where-Object { $_.Extension -ne ".sig" -and $_.Extension -ne ".zip" } | Select-Object -First 1
          if ($null -eq $installerFile) {
              Write-Error "Could not find installer file for signature $($sigFile.Name)"
              exit 1
          }
          
          $fileName = $installerFile.Name
          # GitHub replaces spaces with dots in release assets
          $ghFileName = $fileName -replace " ", "."
          echo "Installer name on GitHub: $ghFileName"
          
          # Format for Tauri v2 Updater JSON
          $json = @{
              version = $version
              notes = "Release v$version"
              pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
              platforms = @{
                  "windows-x86_64" = @{
                      signature = $sigContent
                      url = "https://github.com/khoirulaksara/archradio/releases/download/v$version/$ghFileName"
                  }
              }
          }
          $json | ConvertTo-Json -Depth 10 | Set-Content latest.json
          
          # Copy the .sig file for manual upload as well
          Copy-Item $sigFile.FullName "Arch-Radio.sig"

      - name: Prepare Portable Version
        shell: pwsh
        run: |
          $name = "Arch Radio"
          $exePath = "src-tauri/target/release/${name}.exe"
          if (Test-Path $exePath) {
            Copy-Item $exePath "Arch-Radio-Portable.exe"
          } else {
            $exePath = Get-ChildItem "src-tauri/target/release/*.exe" | Select-Object -First 1
            Copy-Item $exePath.FullName "Arch-Radio-Portable.exe"
          }

      - name: Upload Assets to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          files: |
            latest.json
            Arch-Radio.sig
            Arch-Radio-Portable.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
