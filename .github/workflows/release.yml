name: Release Arch Radio

on:
  push:
    branches:
      - main

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm install

      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Generate Version
        id: version
        shell: pwsh
        run: |
          $major = (Get-Date).Year % 100
          $minor = (Get-Date).Month
          $version = "$major.$minor.${{ github.run_number }}"
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

          # Update tauri.conf.json
          $config = Get-Content src-tauri/tauri.conf.json | ConvertFrom-Json
          $config.version = $version
          $config | ConvertTo-Json -Depth 10 | Set-Content src-tauri/tauri.conf.json

          # Update Cargo.toml
          $cargo = Get-Content src-tauri/Cargo.toml
          $cargo = $cargo -replace '^version = ".*"', "version = `"$version`""
          Set-Content src-tauri/Cargo.toml $cargo

      - name: Generate Changelog
        id: changelog
        shell: pwsh
        run: |
          $commits = git log $(git describe --tags --abbrev=0 2>$null || git rev-list --max-parents=0 HEAD)..HEAD --pretty=format:"%s"
          $feats = $commits | Where-Object { $_ -match '^feat' }
          $fixes = $commits | Where-Object { $_ -match '^fix' }
          $others = $commits | Where-Object { $_ -notmatch '^(feat|fix)' }

          $body = "## Release v${{ steps.version.outputs.VERSION }}`n`n"
          if ($feats) { $body += "### 🚀 Features`n" + ($feats -join "`n") + "`n`n" }
          if ($fixes) { $body += "### 🛠️ Fixes`n" + ($fixes -join "`n") + "`n`n" }
          if ($others) { $body += "### 📝 Others`n" + ($others -join "`n") + "`n`n" }

          $body | Set-Content changelog.md
          $content = Get-Content changelog.md -Raw
          $content = $content -replace "`n", "%0A" -replace "`r", ""
          echo "BODY=$content" >> $env:GITHUB_OUTPUT

      - name: Build Tauri App
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          echo "Signing env check: KEY length=$($env:TAURI_SIGNING_PRIVATE_KEY.Length)"
          cd src-tauri
          cargo tauri build --verbose
          cd ..

      - name: Collect Artifacts and Create Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $tag = "v$version"
          $bundleDir = "src-tauri/target/release/bundle"

          # List all files for debugging
          Get-ChildItem -Path $bundleDir -Recurse | Select-Object FullName | Format-List

          # Find signature files
          $sigFiles = Get-ChildItem -Path $bundleDir -Filter "*.sig" -Recurse | Where-Object { $_.Name -notlike "*.zip.sig" }
          echo "Found $($sigFiles.Count) signature file(s)"

          if ($sigFiles.Count -eq 0) {
            Write-Error "No .sig files found! Signing failed."
            exit 1
          }

          # Prefer MSI sig, fallback to NSIS sig
          $msiSig = $sigFiles | Where-Object { $_.Name -like "*.msi.sig" } | Select-Object -First 1
          $nsisExeSig = $sigFiles | Where-Object { $_.Name -like "*.exe.sig" } | Select-Object -First 1
          $primarySig = if ($msiSig) { $msiSig } else { $nsisExeSig }
          $sigContent = Get-Content $primarySig.FullName -Raw

          # Find MSI installer
          $msiFile = Get-ChildItem -Path $bundleDir -Filter "*.msi" -Recurse | Where-Object { $_.Name -notlike "*.zip" } | Select-Object -First 1
          $nsisFile = Get-ChildItem -Path $bundleDir -Filter "*-setup.exe" -Recurse | Select-Object -First 1

          echo "MSI: $($msiFile.FullName)"
          echo "NSIS: $($nsisFile.FullName)"
          echo "SIG: $($primarySig.FullName)"

          # Determine URL filename (GitHub replaces spaces with dots)
          $msiGhName = $msiFile.Name -replace " ", "."
          $msiUrl = "https://github.com/khoirulaksara/archradio/releases/download/$tag/$msiGhName"

          # Build latest.json
          $pub_date = (Get-Date -Format "yyyy-MM-ddTHH:mm:ssZ")
          $latestJson = @{
            version  = $version
            notes    = "Release $tag"
            pub_date = $pub_date
            platforms = @{
              "windows-x86_64" = @{
                signature = $sigContent.Trim()
                url       = $msiUrl
              }
            }
          } | ConvertTo-Json -Depth 10
          $latestJson | Set-Content latest.json
          echo "Generated latest.json:"
          cat latest.json

          # Copy portable exe
          $portableExe = "src-tauri/target/release/archradio.exe"
          Copy-Item $portableExe "Arch-Radio-Portable.exe" -ErrorAction SilentlyContinue

          # Create release
          gh release create $tag `
            --title "Arch Radio $tag" `
            --notes-file changelog.md `
            $msiFile.FullName `
            $nsisFile.FullName `
            "latest.json" `
            "Arch-Radio-Portable.exe"
